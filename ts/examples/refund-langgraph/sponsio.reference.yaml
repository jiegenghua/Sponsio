version: 1

# ─────────────────────────────────────────────────────────────────────
#  Refund agent contracts — Layer-3 (response / ctx / time-bound).
#
#  These contracts express what the host stack already knows but the
#  LLM doesn't: who's calling, whether HITL approved a high-value
#  refund, and what the response is allowed to contain.
# ─────────────────────────────────────────────────────────────────────

runtime:
  mode: enforce

agents:
  refund_bot:
    contracts:
      # 1. Every refund must run under an attested caller_id from the
      #    auth layer. observeContext() is the bridge.
      - G: { pattern: ctx_required, args: ["issue_refund", "caller_id", ["agent-1", "agent-2"]] }

      # 2. High-value refunds need a fresh senior_eng approval. ≤60s
      #    of event-clock time since observeApproval() was called.
      - G: { pattern: approval_active, args: ["issue_refund_high_value", "senior_eng", 60] }

      # 3. Per-session ceiling on routine refunds.
      - G: { pattern: rate_limit, args: ["issue_refund", 5] }

      # 4. LLM reply must not leak email / SSN / credit-card numbers.
      - G: { pattern: no_pii, args: [["email", "ssn", "credit_card"]] }

      # 5. LLM reply must stay under 200 words (cost + abuse cap).
      - G: { pattern: max_length, args: [200] }
