version: 1

# ─────────────────────────────────────────────────────────────────────
#  DevOps agent contracts — argument + OWASP defense set.
#
#  Drop-in canonical config for an agent that runs shell commands,
#  queries production SQL, writes log files, and (rarely) reboots
#  hosts. Everything is deterministic — pure check over the event
#  trace, no LLM consulted at runtime.
# ─────────────────────────────────────────────────────────────────────

runtime:
  mode: enforce

agents:
  devops_bot:
    contracts:
      # 1. Ban the most-common bash footguns. Pattern factory expands
      #    to a regex blacklist on serialized args of the ``bash`` tool.
      - G: { pattern: dangerous_bash_commands }

      # 2. Ban dangerous SQL verbs (DROP / TRUNCATE / DELETE / ALTER).
      - G: { pattern: dangerous_sql_verbs, args: ["run_sql"] }

      # 3. ``write_file`` may only write under /tmp/ or /var/log/.
      - G: { pattern: scope_limit, args: ["write_file", ["/tmp/", "/var/log/"]] }

      # 4. ``shutdown_host`` is destructive — require an explicit
      #    ``confirm_shutdown_host`` step first.
      - G: { pattern: must_confirm, args: ["shutdown_host"] }

      # 5. Whitelist — only these five tools may run.
      - G: { pattern: tool_allowlist, args: [["bash", "run_sql", "write_file", "shutdown_host", "confirm_shutdown_host"]] }

      # 6. Soft cap on how many bash invocations one session may issue.
      - G: { pattern: rate_limit, args: ["bash", 5] }
