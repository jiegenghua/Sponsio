# =============================================================================
# sponsio/contracts/capability/credentials.yaml
#
# Capability pack — credential-shaped strings in file-write content.
# Include when your agent exposes write / edit tools and you don't
# want secrets to leak from the agent's working memory into committed
# files, READMEs, or anywhere else that gets diff'd / pushed / shared.
#
# Real-world incidents this pack defends against:
#
#   - Cursor + ``.cursorignore`` bypass (Apr 2024 → Dec 2025): agent
#     read ``.env`` (allowed by user) then included its content in
#     prompts that were silently sent to AI providers.  Same pattern
#     surfaces when a sub-agent is told "summarize the project setup"
#     and writes the env values verbatim into a README.
#   - Claude Code sub-agent leak pattern (recurring r/ClaudeAI):
#     parent agent reads ``.env`` for setup verification, spawns a
#     ``Task`` sub-agent with full context, sub-agent dutifully echoes
#     ``STRIPE_SECRET_KEY=...`` into a generated file.  Then a final
#     ``git commit && git push`` pushes secrets to a public repo.
#   - Generic agent-in-IDE foot-guns: API keys ending up in commit
#     messages, log lines, Slack messages composed by an agent.
#
# Threat model boundary: this pack catches credential SHAPES in tool
# *arguments* — i.e. the content the agent is about to write.  It
# does NOT catch:
#   - Credentials reformatted (base64'd, split across lines, etc.)
#   - Read tools (read of ``.env`` is allowed by default; the
#     sensitive-path read denies live in ``_host.yaml`` for the
#     cases that DO matter)
#   - Token exfil via outbound HTTP that happens not to use
#     ``Bash``/``Write`` (use ``capability/network`` for that —
#     planned)
#
# Include via:
#   include:
#     - sponsio:capability/credentials
#
# Tool naming:
#   The pack uses canonical ``write`` / ``edit`` / ``apply_patch``
#   for the write surface.  Claude Code's ``_host.yaml`` adds
#   ``write: Write`` / ``edit: Edit`` / ``apply_patch: MultiEdit``
#   to its ``tool_rename`` block; OpenClaw's ``_host_openclaw.yaml``
#   inherits canonical names directly.
#
# Source tag convention:
#   library:tier1.credentials
# =============================================================================

version: "1"

tools:
  - name: write
    description: "Write or overwrite a file (placeholder — replace with your tool's name)"
    params: "path: str, content: str"
  - name: edit
    description: "In-place edit of an existing file"
    params: "path: str, new_string: str"
  - name: apply_patch
    description: "Apply a unified diff to a file"
    params: "path: str, diff: str"

agents:
  "*":
    contracts:

      # =================================================================
      # § 1 — Block credential shapes in file-write CONTENT
      # =================================================================
      #
      # The regex inventory targets the most common shapes that
      # `git secrets`, gitleaks, trufflehog and friends recognise.
      # Conservative on purpose: false positives here only block one
      # write — the user can re-prompt with a redacted version.
      # False negatives mean the secret ships, which is much worse.

      - desc: "Block writes containing AWS / GCP / Azure / cloud creds"
        E:
          pattern: arg_blacklist
          args:
            - write
            - content
            - - "AKIA[A-Z0-9]{16}"                              # AWS access key
              - "ASIA[A-Z0-9]{16}"                              # AWS temp creds
              - "(?i)aws_secret_access_key\\s*=\\s*[A-Za-z0-9/+=]{40}"
              - "AIza[A-Za-z0-9_-]{35}"                         # Google API key
              - "ya29\\.[A-Za-z0-9_-]{20,}"                     # Google OAuth
          source: "library:tier1.credentials"

      - desc: "Block writes containing GitHub tokens"
        E:
          pattern: arg_blacklist
          args:
            - write
            - content
            - - "ghp_[A-Za-z0-9]{36,}"                          # personal access
              - "ghu_[A-Za-z0-9]{36,}"                          # OAuth user
              - "ghs_[A-Za-z0-9]{36,}"                          # server
              - "gho_[A-Za-z0-9]{36,}"                          # OAuth app
              - "github_pat_[A-Za-z0-9_]{82}"                   # fine-grained PAT
          source: "library:tier1.credentials"

      - desc: "Block writes containing payment-processor / SaaS API keys"
        E:
          pattern: arg_blacklist
          args:
            - write
            - content
            # Two key-prefix shapes co-exist in the wild:
            #   underscore-style (Stripe):  sk_live_<base64ish>
            #   dash-style (OpenAI / Anthropic): sk-proj-<base64-with-dashes>
            # Both random suffixes are >= 20 chars in practice.
            - - "sk_(live|test)_[A-Za-z0-9]{20,}"               # Stripe
              - "sk-(live|test|proj|ant)-[A-Za-z0-9_-]{20,}"    # OpenAI / Anthropic
              - "rk_(live|test)_[A-Za-z0-9]{20,}"               # Stripe restricted
              - "xox[baprs]-[A-Za-z0-9-]{10,}"                  # Slack
              - "SG\\.[A-Za-z0-9_-]{22}\\.[A-Za-z0-9_-]{43}"   # SendGrid
              - "key-[a-f0-9]{32}"                              # Mailgun
          source: "library:tier1.credentials"

      - desc: "Block writes containing private keys / SSH material"
        E:
          pattern: arg_blacklist
          args:
            - write
            - content
            - - "-----BEGIN\\s+(RSA|OPENSSH|EC|DSA|PGP)\\s+PRIVATE KEY"
              - "-----BEGIN\\s+ENCRYPTED\\s+PRIVATE KEY"
          source: "library:tier1.credentials"

      # =================================================================
      # § 2 — Mirror rules for in-place edit (Claude Code's `Edit`)
      # =================================================================
      #
      # Editing is the same threat surface as Write — sub-agents that
      # leak secrets often do so by editing a README in place rather
      # than creating a new file.  Same regex inventory; pinned to
      # ``new_string`` (the canonical `edit` tool's payload field).

      - desc: "Block edits containing AWS / GCP / Azure / cloud creds"
        E:
          pattern: arg_blacklist
          args:
            - edit
            - new_string
            - - "AKIA[A-Z0-9]{16}"
              - "ASIA[A-Z0-9]{16}"
              - "(?i)aws_secret_access_key\\s*=\\s*[A-Za-z0-9/+=]{40}"
              - "AIza[A-Za-z0-9_-]{35}"
              - "ya29\\.[A-Za-z0-9_-]{20,}"
          source: "library:tier1.credentials"

      - desc: "Block edits containing GitHub tokens"
        E:
          pattern: arg_blacklist
          args:
            - edit
            - new_string
            - - "ghp_[A-Za-z0-9]{36,}"
              - "ghu_[A-Za-z0-9]{36,}"
              - "ghs_[A-Za-z0-9]{36,}"
              - "gho_[A-Za-z0-9]{36,}"
              - "github_pat_[A-Za-z0-9_]{82}"
          source: "library:tier1.credentials"

      - desc: "Block edits containing payment-processor / SaaS API keys"
        E:
          pattern: arg_blacklist
          args:
            - edit
            - new_string
            - - "sk_(live|test)_[A-Za-z0-9]{20,}"
              - "sk-(live|test|proj|ant)-[A-Za-z0-9_-]{20,}"
              - "rk_(live|test)_[A-Za-z0-9]{20,}"
              - "xox[baprs]-[A-Za-z0-9-]{10,}"
              - "SG\\.[A-Za-z0-9_-]{22}\\.[A-Za-z0-9_-]{43}"
              - "key-[a-f0-9]{32}"
          source: "library:tier1.credentials"

      - desc: "Block edits containing private keys / SSH material"
        E:
          pattern: arg_blacklist
          args:
            - edit
            - new_string
            - - "-----BEGIN\\s+(RSA|OPENSSH|EC|DSA|PGP)\\s+PRIVATE KEY"
              - "-----BEGIN\\s+ENCRYPTED\\s+PRIVATE KEY"
          source: "library:tier1.credentials"
