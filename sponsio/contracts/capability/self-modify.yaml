# =============================================================================
# sponsio/contracts/capability/self-modify.yaml
#
# Capability pack — self-modification protection for the host agent.
# Include in your host library (default ``_host``) so the agent
# under guard cannot weaken or disable the very contracts about to
# block its next call.
#
# Threat model:
#
# An agent that can edit its own ``~/.sponsio/plugins/_host/sponsio.yaml``
# can append an ``overrides:`` block to disable the rule about to
# fire against it.  This is privilege escalation by self-rewriting:
# the safety mechanism becomes the agent's own debuggable resource.
# Observed in the wild during the development of this very pack —
# the host agent (Claude Code in auto mode) attempted to add an
# ``overrides`` block to disable a Bash rate_limit that had just
# blocked it.  Caught by Claude Code's harness-level meta-deny that
# time, but a sponsio-native rule is the right defense — it travels
# with the user's config to any host (Cursor, Codex, custom MCP).
#
# What this pack denies:
#   - Edit / Write / MultiEdit on the legacy host guard config:
#     ``~/.sponsio/plugins/_host/sponsio.yaml``
#   - Edit / Write / MultiEdit on ANY per-plugin / per-MCP-server
#     library (``~/.sponsio/plugins/<plugin-id>/sponsio.yaml``
#     where ``<plugin-id>`` does NOT start with ``_host``).
#     The legitimate way to add or update these bundles is the
#     ``sponsio plugin install`` / ``sponsio plugin scan --apply``
#     CLI — those write via Python subprocess, not the agent's
#     Edit/Write tool surface, so they aren't blocked.  The user
#     hand-editing the file in their text editor is also fine.
#     What's denied is the IDE coding agent reaching in with its
#     own Edit/Write tools to weaken or rewrite a bundle that's
#     about to fire against it.
#
# Per-host buckets (``_host_cursor`` / ``_host_claude_code`` / etc.)
# carry their own targeted self-modify rules INSIDE their starter
# yaml, scoped to that one bucket only. The split keeps the
# legitimate "parent manages child policy" workflow alive — Cursor's
# main agent can still edit ``_host_cursor_subagent/sponsio.yaml``
# (tightening child rules from the parent context), and an operator
# managing both Cursor and Claude Code from one IDE can edit the
# OTHER host's bucket without being blocked.  Each agent only loses
# write access to ITS OWN bucket — that's the privilege boundary
# this pack family enforces.  The ``[^_]...`` regex below excludes
# every ``_host*`` bucket from the per-plugin rule precisely so this
# parent-child workflow stays open.
#
# What this pack does NOT deny:
#   - Edits to per-host SUBAGENT buckets (``_host_*_subagent``).
#     Parent tightening child policy is a sanctioned workflow.
#   - Edits to a SIBLING host bucket (an operator on Claude Code
#     editing ``_host_cursor/`` or vice versa).
#   - Edits to the project's own ``sponsio.yaml`` (the one
#     ``sponsio onboard`` writes into the user's repo).  That file
#     IS supposed to evolve — onboard / scan / refresh all rewrite
#     it.  Locking it would break the core happy path.
#   - Direct edits via the user's IDE, terminal, or
#     ``sponsio plugin install`` / ``plugin scan --apply`` CLI —
#     those don't go through the ``Edit`` / ``Write`` tool surface
#     that this pack inspects.  The legitimate path for "I really
#     do want to change this" stays open; only the agent-mediated
#     path is closed.
#
# Pair with: ``sponsio:incident/subagent-escape`` for the matching
# subagent-side rule (sub-agents can't reach UP into the parent's
# config tree at all).
#
# Include via:
#   include:
#     - sponsio:capability/self-modify
#
# Source tag convention:
#   library:tier1.self-modify
# =============================================================================

version: "1"

agents:
  "*":
    contracts:

      # =================================================================
      # § 1 — No agent-mediated Edit of own host guard config
      # =================================================================

      - desc: "Host agent must not edit any sponsio guard config (host bucket or per-plugin bundle) — use `sponsio plugin install` / `plugin scan --apply`, or hand-edit"
        E:
          pattern: arg_blacklist
          args:
            - Edit
            - file_path
            # Match every per-host bucket: ``_host`` (legacy),
            # ``_host_cursor`` / ``_host_cursor_subagent``,
            # ``_host_claude_code`` / ``_host_claude_code_subagent``,
            # ``_host_openclaw``, plus any future bucket following the
            # same naming scheme. Per-MCP-server libraries
            # (``github``, ``filesystem``, ``<plugin-id>``) are not
            # ``_host*``-prefixed and stay editable so the host can
            # still manage downstream plugin policy.
            - - "(^|/)\\.sponsio/plugins/_host/sponsio\\.yaml$"
              - "(^|/)\\.sponsio/plugins/[^_/][^/]*/sponsio\\.yaml$"
          source: "library:tier1.self-modify"

      # =================================================================
      # § 2 — No agent-mediated Write of own host guard config
      # =================================================================
      #
      # ``Write`` is the "create or overwrite whole file" tool —
      # blocking it shuts the "delete the file then re-create with
      # rules removed" workaround a pure ``Edit`` block would leave
      # open.

      - desc: "Host agent must not overwrite any sponsio guard config (host bucket or per-plugin bundle) — use the CLI or hand-edit"
        E:
          pattern: arg_blacklist
          args:
            - Write
            - file_path
            - - "(^|/)\\.sponsio/plugins/_host/sponsio\\.yaml$"
              - "(^|/)\\.sponsio/plugins/[^_/][^/]*/sponsio\\.yaml$"
          source: "library:tier1.self-modify"

      # =================================================================
      # § 3 — No agent-mediated MultiEdit of own host guard config
      # =================================================================

      - desc: "Host agent must not multi-edit any sponsio guard config (host bucket or per-plugin bundle) — use the CLI or hand-edit"
        E:
          pattern: arg_blacklist
          args:
            - MultiEdit
            - file_path
            - - "(^|/)\\.sponsio/plugins/_host/sponsio\\.yaml$"
              - "(^|/)\\.sponsio/plugins/[^_/][^/]*/sponsio\\.yaml$"
          source: "library:tier1.self-modify"

# -----------------------------------------------------------------------------
# Integration requirements
# -----------------------------------------------------------------------------
#
# - Path matching is regex on the file_path arg.  Hosts whose Edit /
#   Write / MultiEdit tool uses a different param name will need a
#   per-host adjustment (Claude Code uses ``file_path`` — handled).
#
# - The ``"*"`` agent scope means these rules apply to every agent
#   in any library that includes this pack.  In practice the only
#   include site is ``_host`` (the main session) — a sub-agent
#   trying to touch this same file is covered by the broader
#   ``sponsio:incident/subagent-escape`` pack, which denies the
#   ENTIRE ``~/.sponsio/`` tree to sub-agents.
