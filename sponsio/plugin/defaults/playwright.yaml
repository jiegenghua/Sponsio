# =============================================================================
# Starter library for the official Microsoft Playwright MCP server
# (https://github.com/microsoft/playwright-mcp).
#
# Routing key: ``playwright`` — every tool whose name follows the
# ``mcp__playwright__*`` MCP convention is dispatched here. Older
# forks (e.g. ``mcp__browser__*``) need a tool_rename or a separate
# library file.
#
# Install:
#     sponsio plugin install playwright
# Or hand-copy this file into ``~/.sponsio/plugins/playwright/sponsio.yaml``.
#
# Browser automation has three classes of risk this library covers:
#   1. Indirect prompt injection via fetched page content (mitigated
#      at the model layer; we add belt-and-braces ``arg_blacklist``
#      on the obvious internal-network targets).
#   2. ``browser_evaluate`` runs arbitrary JS in the page context —
#      effectively a second ``Bash`` for the browser.
#   3. ``browser_type`` / ``browser_fill_form`` typing credit-card or
#      password-shaped strings is an exfil signal worth blocking.
# =============================================================================

version: "1"

agents:
  playwright:
    contracts:

      # -----------------------------------------------------------------
      # § 1 — Navigation: block internal-network targets
      #
      # Same SSRF defence as a regular HTTP client. Override this if
      # you legitimately drive an internal app — the override should
      # narrow to the exact hostname rather than disable the rule.
      # -----------------------------------------------------------------

      - desc: "browser_navigate must not target internal / private hosts"
        E:
          pattern: arg_blacklist
          args:
            - mcp__playwright__browser_navigate
            - url
            - - "^https?://(localhost|127\\.|0\\.0\\.0\\.0|10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.)"
              - "^https?://[^/]*\\.local(/|$|:)"
              - "^https?://[^/]*\\.internal(/|$|:)"
              - "^file://"
              - "^about:"
              - "^chrome://"
              - "^javascript:"

      # -----------------------------------------------------------------
      # § 2 — browser_evaluate: arbitrary JS in page context
      #
      # ``browser_evaluate`` is to the browser what ``Bash`` is to the
      # shell. The MCP server exposes it; we treat it like
      # ``capability/shell``: blacklist the obvious data-exfil
      # primitives, cap session count, cap consecutive runs.
      # -----------------------------------------------------------------

      - desc: "browser_evaluate must not exfil document content via fetch / sendBeacon"
        E:
          pattern: arg_blacklist
          args:
            - mcp__playwright__browser_evaluate
            - function
            - - "navigator\\.sendBeacon"
              - "fetch\\s*\\(\\s*['\"`]https?:"
              - "XMLHttpRequest\\b"
              - "WebSocket\\s*\\("
              - "document\\.cookie"
              - "localStorage\\.(getItem|key)"
              - "sessionStorage\\.(getItem|key)"

      - desc: "no more than 30 browser_evaluate calls per session"
        E:
          pattern: rate_limit
          args: [mcp__playwright__browser_evaluate, 30]

      - desc: "no more than 5 consecutive browser_evaluate calls"
        E:
          pattern: loop_detection
          args: [mcp__playwright__browser_evaluate, 5]

      # -----------------------------------------------------------------
      # § 3 — Form fills: don't type credentials / payment data
      # -----------------------------------------------------------------

      - desc: "browser_type must not send credit-card-shaped strings"
        E:
          pattern: arg_blacklist
          args:
            - mcp__playwright__browser_type
            - text
            - - "\\b(?:\\d[ -]?){13,19}\\b"

      - desc: "browser_fill_form must not send credit-card-shaped strings"
        E:
          pattern: arg_blacklist
          args:
            - mcp__playwright__browser_fill_form
            - value
            - - "\\b(?:\\d[ -]?){13,19}\\b"

      # -----------------------------------------------------------------
      # § 4 — Misc
      # -----------------------------------------------------------------

      - desc: "no more than 50 navigations per session (loop / scrape cap)"
        E:
          pattern: rate_limit
          args: [mcp__playwright__browser_navigate, 50]

      - desc: "no more than 100 screenshots per session"
        E:
          pattern: rate_limit
          args: [mcp__playwright__browser_take_screenshot, 100]

# -----------------------------------------------------------------------------
# Notes
# -----------------------------------------------------------------------------
#
# * Tool names track Microsoft's playwright-mcp v0.0.18+ schema.
#   Older releases used ``browser_navigate_to`` / ``browser_screenshot``;
#   add a ``tool_rename:`` block in your config if you're pinned.
#
# * The credit-card regex is the Luhn-window shape (13–19 digits with
#   optional spaces / hyphens). It will catch *some* false positives
#   (long phone-number sequences); narrow per agent if it's a problem.
#
# * The internal-host blacklist is a defense-in-depth: real browser
#   sandboxes already block ``file://`` and ``chrome://`` in MCP
#   contexts, but reproducing the rule here keeps the contract
#   visible at audit time.
