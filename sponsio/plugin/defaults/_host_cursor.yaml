# =============================================================================
# Sample contract library for the cursor host's built-in tools.
#
# The sponsio host plugin routes any tool call whose name is
# one of Claude Code's first-party tools (Bash, Edit, Write, Read, …)
# into this library. Plugin-provided tools (`my-plugin:hello`,
# `mcp__server__tool`) get their own per-plugin libraries under
# ../<plugin-id>/sponsio.yaml.
#
# After installing the sponsio host plugin, copy this file (and
# any sibling per-plugin libraries) into ``~/.sponsio/plugins/_host/``
# to activate.  Override individual rules with ``overrides:``.
#
# Note on tool names + params:
#   The shared `sponsio:capability/filesystem` pack uses canonical names
#   (read/write/edit, param=path), but Claude Code's actual tool surface
#   uses Bash / Read / Write / Edit / MultiEdit with param=file_path.
#   `tool_rename:` remaps tool names but not param names, so
#   filesystem-side rules are written directly here against the real
#   Claude Code shape rather than via include.
# =============================================================================

version: "1"

agents:
  _host_cursor:
    # Reuse the shell-capability pack against Bash. This covers
    # rm -rf /, fork bombs, curl|bash, reverse-shell primitives,
    # line-continuation evasion, etc.  ``credentials`` covers
    # secret-shape payloads in Write.content / Edit.new_string —
    # rename canonical ``write`` / ``edit`` / ``apply_patch`` to
    # Claude Code's actual tool surface.
    tool_rename:
      exec: Bash
      write: Write
      edit: Edit
      apply_patch: MultiEdit

    include:
      - sponsio:capability/shell
      - sponsio:capability/database
      - sponsio:capability/credentials
      - sponsio:incident/claude-code-secret-bypass
      # Self-modification protection — block agent-mediated edits to
      # ``~/.sponsio/plugins/_host_cursor/sponsio.yaml`` so the agent under
      # guard cannot weaken or disable the rule about to fire.  The
      # pack only locks the agent's OWN file; managing sub-agent or
      # per-plugin libraries stays open (legitimate parental control).
      - sponsio:capability/self-modify

    contracts:
      # ---------- Sensitive-file blocks for Write / Edit / MultiEdit ----------
      # Mirrors the `sponsio:capability/filesystem` deny patterns but
      # uses Claude Code's actual `file_path` arg.
      - desc: "Block writes to dotenv / secrets / SSH keys / cloud creds"
        E:
          pattern: arg_blacklist
          args:
            - Write
            - file_path
            - - "(^|/)\\.ssh/"
              - "(^|/)\\.aws/credentials"
              - "(^|/)\\.aws/config"
              - "(^|/)\\.env(\\.(?!example$|sample$|template$|dist$)[\\w.-]+)?$"
              - "(^|/)\\.netrc"
              - "(^|/)\\.pgpass"
              - "(^|/)\\.kube/config"
              - "(^|/)\\.docker/config\\.json"
              - "(^|/)\\.gnupg/"
              - "^/etc/shadow($|/)"
              - "^/etc/sudoers($|\\.d/|$)"
              - "^/etc/ssh/ssh_host_"
              - "^/etc/ssl/private/"
              - "(^|/)Library/Keychains/"
              - "(^|/)Library/LaunchAgents/"

      - desc: "Block edits to dotenv / secrets / SSH keys / cloud creds"
        E:
          pattern: arg_blacklist
          args:
            - Edit
            - file_path
            - - "(^|/)\\.ssh/"
              - "(^|/)\\.aws/credentials"
              - "(^|/)\\.aws/config"
              - "(^|/)\\.env(\\.(?!example$|sample$|template$|dist$)[\\w.-]+)?$"
              - "(^|/)\\.netrc"
              - "(^|/)\\.pgpass"
              - "(^|/)\\.kube/config"
              - "(^|/)\\.docker/config\\.json"
              - "(^|/)\\.gnupg/"
              - "^/etc/shadow($|/)"
              - "^/etc/sudoers($|\\.d/|$)"
              - "(^|/)Library/Keychains/"

      - desc: "Block multi-file edits to dotenv / secrets / SSH keys / cloud creds"
        E:
          pattern: arg_blacklist
          args:
            - MultiEdit
            - file_path
            - - "(^|/)\\.ssh/"
              - "(^|/)\\.aws/credentials"
              - "(^|/)\\.aws/config"
              - "(^|/)\\.env(\\.(?!example$|sample$|template$|dist$)[\\w.-]+)?$"
              - "(^|/)\\.netrc"
              - "(^|/)\\.pgpass"
              - "(^|/)\\.kube/config"
              - "(^|/)\\.docker/config\\.json"
              - "(^|/)\\.gnupg/"
              - "^/etc/shadow($|/)"
              - "^/etc/sudoers($|\\.d/|$)"
              - "(^|/)Library/Keychains/"

      # ---------- Self-modify protection: lock OWN bucket only ----------
      #
      # The Cursor main agent should not be able to weaken or disable
      # the rule about to fire against itself.  We block all four
      # write surfaces (Edit / Write / MultiEdit / Bash with shell
      # write operators) against this bucket's own ``sponsio.yaml``,
      # and ONLY this bucket — sibling buckets stay editable so:
      #
      #   * Cursor main agent CAN edit ``_host_cursor_subagent/`` to
      #     tighten child rules (legitimate parental control).
      #   * Cursor main agent CAN edit other hosts' buckets
      #     (``_host_claude_code/``, ``_host_openclaw/``) — that's an
      #     operator-driven workflow, not self-modify.
      #   * Cursor main agent CAN edit per-MCP-server libraries
      #     (``github/``, ``filesystem/``, ``<plugin-id>/``).
      #
      # The included ``sponsio:capability/self-modify`` pack covers
      # the legacy ``_host/sponsio.yaml`` path for users who haven't
      # migrated to the per-host bucket layout. The rules below add
      # the per-bucket coverage that the shared pack can't express.
      #
      # The canonical "add a contract" path stays open:
      #
      #   sponsio plugin scan -o ~/.sponsio/plugins/_host_cursor/sponsio.yaml
      #
      # That CLI writes via Python (atomic, validated, additive
      # merge); the Bash invocation that triggers it has no shell
      # write operator and never matches the regex below.
      - desc: "Cursor: block Edit on own _host_cursor sponsio guard config"
        E:
          pattern: arg_blacklist
          args:
            - Edit
            - file_path
            - - "(^|/)\\.sponsio/plugins/_host_cursor/sponsio\\.yaml$"

      - desc: "Cursor: block Write on own _host_cursor sponsio guard config"
        E:
          pattern: arg_blacklist
          args:
            - Write
            - file_path
            - - "(^|/)\\.sponsio/plugins/_host_cursor/sponsio\\.yaml$"

      - desc: "Cursor: block MultiEdit on own _host_cursor sponsio guard config"
        E:
          pattern: arg_blacklist
          args:
            - MultiEdit
            - file_path
            - - "(^|/)\\.sponsio/plugins/_host_cursor/sponsio\\.yaml$"

      - desc: "Cursor: block Bash write-shaped operators on own _host_cursor sponsio guard config"
        E:
          pattern: arg_blacklist
          args:
            - Bash
            - command
            - - ">\\s*[^|&;]*\\.sponsio/plugins/_host_cursor/sponsio\\.yaml"
              - ">>\\s*[^|&;]*\\.sponsio/plugins/_host_cursor/sponsio\\.yaml"
              - "tee\\s+[^|&;]*\\.sponsio/plugins/_host_cursor/sponsio\\.yaml"
              - "sed\\s+-i\\b[^|&;]*\\.sponsio/plugins/_host_cursor/sponsio\\.yaml"
              - "(cp|mv|rm|dd)\\s+[^|&;]*\\.sponsio/plugins/_host_cursor/sponsio\\.yaml"

      # ---------- Read protections for credentials exfiltration ----------
      - desc: "Block reads of SSH keys / cloud creds / dotenv secrets / keychains"
        E:
          pattern: arg_blacklist
          args:
            - Read
            - file_path
            - - "(^|/)\\.ssh/"
              - "(^|/)\\.aws/credentials"
              - "(^|/)\\.aws/config"
              - "(^|/)\\.env(\\.(?!example$|sample$|template$|dist$)[\\w.-]+)?$"
              - "(^|/)\\.netrc"
              - "(^|/)\\.pgpass"
              - "(^|/)\\.kube/config"
              - "(^|/)\\.docker/config\\.json"
              - "(^|/)\\.gnupg/"
              - "^/etc/shadow($|/)"
              - "^/etc/ssh/ssh_host_"
              - "^/etc/ssl/private/"
              - "(^|/)Library/Keychains/"
              - "(^|/)Library/Cookies/"
