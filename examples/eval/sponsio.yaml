version: 1

# No `extractor:` section — the contracts in this example are
# already written by hand.  Add an extractor if you want to extend
# the corpus with `sponsio scan --config examples/eval/sponsio.yaml`.

# `judge:` left at defaults: fallback_mode=allow + circuit_breaker
# on.  This corpus is purely deterministic so the judge isn't
# exercised, but the section is here as a reminder of the knobs.
judge:
  fallback_mode: allow
  circuit_breaker: true

agents:
  customer_bot:
    contracts:
      - desc: Identity must be verified before any refund
        G: "tool `verify_identity` must precede `issue_refund`"

      - desc: At most 2 refunds per session
        G: "tool `issue_refund` at most 2 times"
