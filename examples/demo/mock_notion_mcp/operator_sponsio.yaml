# =============================================================================
# Operator-supplied Sponsio config for the Notion MCP composition demo.
#
# Drop this at:
#   $DEMO_HOME/.sponsio/plugins/notion/sponsio.yaml
#
# What the operator declares here:
#
#   * The bundle (sponsio:incident/mcp-composition) ships universal
#     body-shape rules for free — secret-shape KEY=VAL payloads + shell
#     substitutions in Notion page bodies are blocked unconditionally.
#
#   * Below: the operator's narrow workspace allowlist.  Only
#     ws-user-private-7777 is allowed; ws-public-leak-9999 is implicitly
#     denied even if the agent gets injected.
#
# This is the canonical "lethal trifecta" defense (Simon Willison 2025-06):
#   - private data: notes on local disk
#   - untrusted content: one note has a hidden injection in HTML comments
#   - external comms: Notion MCP write
# Sponsio doesn't try to detect the injection (that's an LLM-judge problem);
# it stops the resulting cross-workspace write at the action boundary.
# =============================================================================

version: "1"

agents:
  notion:
    include:
      - sponsio:incident/mcp-composition

    contracts:
      # ---- Workspace allowlist (the lethal-trifecta defense) ----------
      - desc: "Notion MCP create_page: parent workspace restricted to ws-user-private-7777"
        G:
          ltl: 'G(called(mcp__notion__create_page) -> arg_field_has(mcp__notion__create_page, parent, "ws-user-private-7777"))'

      - desc: "Notion MCP append_block_children: target page must be in user's workspace prefix"
        G:
          # Block IDs are page-prefixed in mock; in real Notion the API
          # returns objects whose parent.workspace_id is checkable.  For
          # the demo we cap append targets to the search-returned IDs.
          ltl: 'G(called(mcp__notion__append_block_children) -> arg_field_has(mcp__notion__append_block_children, block_id, "^page-existing-[0-9]+$"))'
