# =============================================================================
# Operator-supplied Sponsio config for the Lethal Trifecta demo.
#
# Drop this at:
#   $DEMO_HOME/.sponsio/plugins/gh_gist/sponsio.yaml
#
# This file is the **single yaml** that catches the cross-skill privacy
# leak.  Five interlocking rules close every leg of the lethal trifecta:
#
#   Trifecta leg                     Rule(s) that close it
#   --------------------------------  --------------------------------
#   1. Private data accessed         R1, R5 (trace-aware, fires only
#      via the notes-reader skill        after the agent actually read
#                                        notes — no FP on agents that
#                                        never read anything)
#
#   2. Untrusted content ingested    Out of scope for action-boundary
#      (imported shared/Q3.md           enforcement.  Sponsio assumes
#      contains the injection)         injection succeeded; the rules
#                                        below catch the *resulting
#                                        action* regardless of cause.
#
#   3. External communication via    R1 — gist must be private only
#      Gist write (the Skill B exit) R2 — gist body cannot contain ≥3
#                                            KEY=VAL secret-shape pairs
#                                       R3 — gist body cannot contain
#                                            ≥2 salary patterns
#                                       R4 — gist body cannot contain
#                                            employment-termination
#                                            language (PIP / fired /
#                                            severance / exit by …)
#                                       R5 — body cannot contain ≥2
#                                            customer ARR/MRR figures
#
# The bundle's own §3b rules already cover the three body-shape rules
# (KEY=VAL, salary, termination, ARR) — the bundle does the heavy
# lifting.  This file adds the privacy + trace-aware rules that need
# operator-specific knowledge ("MY gists are always private").
# =============================================================================

version: "1"

agents:
  gh_gist:
    include:
      - sponsio:incident/mcp-composition

    contracts:

      # ─── R1: gists are private only (canonical first defense) ──────
      - desc: "GitHub Gist must be private (public: false)"
        G:
          ltl: 'G(called(mcp__gh_gist__create_gist) -> arg_field_has(mcp__gh_gist__create_gist, public, "False|false"))'

      # ─── R2: trace-aware lethal-trifecta — after reading any note,
      #         require gist privacy AND a small file count.  The
      #         second clause stops the "create one big gist with all
      #         my notes" exfil idiom even if R1 were relaxed.
      - desc: "After reading work notes, gist must remain private"
        activate_at: first_match
        A:
          ltl: 'F(arg_field_has(Read, file_path, "/work/notes/|/work/shared/"))'
        G:
          ltl: 'G(called(mcp__gh_gist__create_gist) -> arg_field_has(mcp__gh_gist__create_gist, public, "False|false"))'

      # ─── R3: file count cap — a single gist with >2 files is
      #         almost always a "dump everything" leak shape rather
      #         than a focused snippet share.  The benign use case
      #         (one small reproducer) survives.
      - desc: "Gist file count: at most 2 files per create_gist call"
        G:
          # A files dict serializes with one ".md" or "filename" key
          # per entry; a 3+-file dump shows the pattern below.
          ltl: 'G(called(mcp__gh_gist__create_gist) -> !arg_field_has(mcp__gh_gist__create_gist, files, "(\\.md\"\\s*:.*?){3,}"))'

      # R4 and R5 (body-shape defenses for salary / termination /
      # ARR / KEY=VAL / $()) already come from the bundle:
      # `sponsio:incident/mcp-composition` § 3b — included above.
      # We don't repeat them here; they fire automatically.
