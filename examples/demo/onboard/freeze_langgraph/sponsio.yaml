version: 1

# Parse-time LLM (used by `sponsio scan` to turn code/docs into
# contracts).  Offline & one-shot — favour accuracy over latency.
extractor:
  provider: gemini
  model: gemini-2.5-flash
  api_key: ${GOOGLE_API_KEY}

# Runtime sto-judge (evaluates stochastic atoms like `injection_free`)
# on the agent's hot path.
judge:
  provider: gemini
  model: gemini-2.5-flash
  api_key: ${GOOGLE_API_KEY}
  fallback_mode: allow
  circuit_breaker: true

defaults:
  mode: enforce  # observe|enforce — observe = shadow (safe default)

tools:
  - name: user_instruction
    description: "Record a user instruction / system-level directive."
    params: "message: str"
  - name: connect_db
    description: "Open a connection to a named database environment."
    params: "database: str"
  - name: read_file
    description: "Read a source file into the agent's working context."
    params: "path: str"
  - name: edit_file
    description: "Apply a unified-diff change to a file."
    params: "path: str, diff: str"
  - name: run_tests
    description: "Run a named test suite."
    params: "suite: str"
  - name: execute_sql
    description: "Execute a SQL query against the currently-connected database."
    params: "query: str"
  - name: escalate_to_human
    description: "Page a human on-call for manual review."
    params: "summary: str"
  - name: generate_status_report
    description: "Write the session's status report to the team channel."
    params: "summary: str"

agents:
  agent:
    contracts:
      # Five rules lifted from policy.md.  Four are assume/guarantee
      # pairs — they activate only when their precondition holds, so
      # benign agents that never declare a freeze / never connect to
      # prod don't trip them.  The simpler rate-limit rule is
      # unconditional.

      - desc: "code freeze: no destructive SQL"
        A:
          ltl: 'F(arg_field_has(user_instruction, message, "freeze|don.t\\s+touch|no\\s+changes|do\\s+not\\s+modify"))'
        G:
          ltl: 'G(!arg_field_has(execute_sql, query, "\\b(DROP|DELETE|TRUNCATE|ALTER)\\b"))'
        source: agent-extracted

      - desc: "after destructive SQL, escalate to a human before any status report"
        A:
          ltl: 'F(arg_field_has(execute_sql, query, "\\b(DROP|DELETE|TRUNCATE)\\b"))'
        G:
          pattern: must_precede
          args: [escalate_to_human, generate_status_report]
        source: agent-extracted

      - desc: "no INSERT after a destructive op (blocks silent reconstruction from memory)"
        A:
          ltl: 'F(arg_field_has(execute_sql, query, "\\b(DELETE|DROP|TRUNCATE)\\b"))'
        G:
          ltl: 'G(!arg_field_has(execute_sql, query, "\\bINSERT\\b"))'
        source: agent-extracted

      - desc: "prod-scoped SQL must be read-only (SELECT / EXPLAIN / SHOW / DESCRIBE)"
        A:
          ltl: 'F(arg_field_has(connect_db, database, "production|prod|main_prod"))'
        G:
          ltl: 'G(called(execute_sql) -> arg_field_has(execute_sql, query, "^\\s*(SELECT|EXPLAIN|SHOW|DESCRIBE)\\b"))'
        source: agent-extracted

      - desc: "execute_sql limited to 50 invocations (no SQL flood)"
        G:
          pattern: rate_limit
          args: [execute_sql, 50]
        source: agent-extracted
