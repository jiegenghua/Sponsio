# Hand-authored Bash guardrails for the cleanup demo.
#
# Why a separate "curated" file: ``sponsio onboard`` runs against the
# project's tool inventory, but Claude Agent SDK projects use the
# SDK's native ``Bash`` tool — there are no ``@tool`` functions for
# the AST scan to find, so the LLM extraction step has zero
# surface area and onboard ends up writing an empty ``contracts:``
# block.  Real users of the SDK author Bash-shaped contracts by
# hand, informed by their incident history.  The demo's recording
# (``assets/demos/cleanup_onboard.tape``) ``cp``s this file over
# the empty onboard output as the visible "now write the rules you
# actually care about" step.
#
# Outside the gif context, you can also point ``Sponsio(config=...)``
# at this file directly — ``sponsio.yaml`` and ``sponsio.curated.yaml``
# are both valid locations, the former just happens to be onboard's
# default output path.

version: 1

# Parse-time LLM block — preserved from onboard's output so any
# future ``sponsio scan`` / ``sponsio refresh`` pass against this
# config keeps reaching for the same provider.  Safe to delete if
# you don't run scans against the demo dir.
extractor:
  provider: gemini
  model: gemini-2.5-flash-lite
  api_key: ${GOOGLE_API_KEY}

judge:
  provider: gemini
  model: gemini-2.5-flash-lite
  api_key: ${GOOGLE_API_KEY}
  fallback_mode: allow
  circuit_breaker: true

defaults:
  mode: observe  # observe|enforce — observe = shadow (safe default)

agents:
  agent:
    contracts:
      # ─── hand-authored Bash guardrails ────────────────────────────
      # Each rule reads "this Bash command pattern fires at most 0
      # times" — i.e. block the destructive shell commands the
      # cleanup-agent breach trajectory tries.
      - desc: "no `rm` on .env / .git paths"
        G:
          ltl: "G((Var('count_with', 'Bash', 'rm\\s+.*(\\.env|\\.git)') <= 0))"
      - desc: "no force-push to main / master"
        G:
          ltl: "G((Var('count_with', 'Bash', 'git\\s+push\\s+.*--force.*\\b(main|master)\\b') <= 0))"
      - desc: "no `git commit` (would freeze the broken state into history)"
        G:
          ltl: "G((Var('count_with', 'Bash', 'git\\s+commit') <= 0))"
