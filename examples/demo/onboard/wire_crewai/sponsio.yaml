version: "1"

agents:
  agent:
    include:
      - sponsio:core/universal

    contracts:
      - desc: "wire_transfer.amount must be at most $50,000 per call"
        G:
          pattern: arg_value_range
          args: [wire_transfer, amount, 0, 50000]
          source: agent-extracted

      - desc: "check_vendor_history must precede wire_transfer"
        G:
          pattern: must_precede
          args: [check_vendor_history, wire_transfer]
          source: agent-extracted

      - desc: "Each invoice may receive at most one wire (idempotent disbursement)"
        G:
          pattern: idempotent
          args: [wire_transfer]
          source: agent-extracted

      - desc: "wire_transfer rate-limited to 5 calls per session"
        G:
          pattern: rate_limit
          args: [wire_transfer, 5]
          source: agent-extracted

runtime:
  mode: observe

judge:
  provider: openai
  model: gpt-4o-mini
