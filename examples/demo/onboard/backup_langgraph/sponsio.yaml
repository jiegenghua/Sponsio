version: 1

# Parse-time LLM (used by `sponsio scan` to turn code/docs into
# contracts).  Offline & one-shot — favour accuracy over latency.
extractor:
  provider: gemini
  model: gemini-2.5-flash
  api_key: ${GOOGLE_API_KEY}

# Runtime sto-judge (evaluates stochastic atoms like `injection_free`)
# on the agent's hot path.
judge:
  provider: gemini
  model: gemini-2.5-flash
  api_key: ${GOOGLE_API_KEY}
  fallback_mode: allow
  circuit_breaker: true

defaults:
  mode: enforce  # observe|enforce — observe = shadow (safe default)

tools:
  - name: list_snapshots
    description: "List backup snapshots under a directory."
    params: "root: str"
  - name: estimate_savings
    description: "Estimate the monthly storage cost for a snapshot glob."
    params: "pattern: str"
  - name: delete_snapshot
    description: "Delete a snapshot by path (requires age_days for audit)."
    params: "path: str, age_days: int"
  - name: generate_report
    description: "Write the cost-optimization report."
    params: "output_path: str"

agents:
  agent:
    include:
      - sponsio:core/universal  # universal: applies to every LLM agent

    contracts:
      # Three rules lifted from policy.md by the prompt-driven
      # onboard pass (host agent reads policy.md + tool inventory,
      # produces these via `sponsio prompt onboard`).  Every line
      # ties back to a sentence in the ops policy doc.

      - desc: "Production DR backups must never be deleted by an automated agent"
        G:
          pattern: arg_blacklist
          args:
            - delete_snapshot
            - path
            - - "^/snapshots/prod/"
        source: agent-extracted

      - desc: "30-day rotation window — older snapshots are part of long-term DR retention"
        G:
          pattern: arg_value_range
          args: [delete_snapshot, age_days, 0, 30]
        source: agent-extracted

      - desc: "At most 5 delete_snapshot calls per session (runaway loop cap)"
        G:
          pattern: rate_limit
          args: [delete_snapshot, 5]
        source: agent-extracted
