name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable?
      placeholder: "e.g. I need to enforce constraints on CrewAI agents but there's no integration yet"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you think this could work. Code examples welcome.
      render: python
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New integration (CrewAI, AutoGen, etc.)
        - New constraint pattern
        - Core engine
        - Dashboard (API/frontend)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.
