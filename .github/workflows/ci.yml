name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core package
        run: pip install -e .

      - name: Install test + integration dependencies
        run: |
          pip install pytest pytest-cov langgraph langchain-core fastapi pydantic uvicorn python-multipart httpx opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp-proto-http
          pip install claude-agent-sdk vercel-ai-sdk || echo "Optional SDK install failed (platform-specific), tests will skip"

      # Build the canonical OpenClaw plugin TS so the
      # ``test_openclaw_artifact_sync`` invariant test (compares
      # ``plugins/sponsio-openclaw/dist/`` byte-for-byte against the
      # wheel-bundled ``sponsio/plugin/openclaw_artifact/dist/``) has
      # both copies on disk. ``npm ci`` pins to the exact lockfile
      # versions that produced the committed bundled artifact, so
      # bytes match.
      - name: Set up Node.js (for OpenClaw plugin build)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Build OpenClaw plugin TS artifact
        working-directory: plugins/sponsio-openclaw
        run: npm ci && npm run build

      - name: Run tests
        run: pytest --cov=sponsio --cov-report=term-missing -v

  test-typescript:
    name: Test (TypeScript — native)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install + Build TS workspace
        working-directory: ts
        # Use the root ``build`` script (which already passes
        # ``--if-present`` to ``npm run build --workspaces``) so the
        # example packages — which intentionally have no ``build``
        # script — don't fail the matrix.
        run: npm install && npm run build

      - name: Run cross-language tests
        working-directory: ts/packages/sdk
        run: node dist/__tests__/core.test.js

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff and dependencies
        run: pip install ruff -e .

      - name: Check formatting
        run: ruff format --check sponsio/ tests/ scripts/

      - name: Check linting
        run: ruff check sponsio/ tests/ scripts/

      - name: Check README/QUICKSTART command sync
        run: |
          # Canonical user-journey commands that must appear identically in
          # both README.md (60-second version) and QUICKSTART.md (full
          # walkthrough). Prevents CLI renames/drift from silently desyncing
          # the two onboarding paths.
          commands=(
            "pip install sponsio"
            "sponsio onboard"
            "sponsio report"
            "SPONSIO_MODE=enforce"
          )
          exit_code=0
          for cmd in "${commands[@]}"; do
            for file in README.md QUICKSTART.md; do
              if ! grep -qF "$cmd" "$file"; then
                echo "::error file=$file::Canonical command missing: $cmd"
                exit_code=1
              fi
            done
          done
          exit $exit_code

      - name: Check README collapsibles intact
        run: |
          # WYSIWYG markdown editors (Typora / Obsidian Live Preview / VS Code
          # Markdown Editor / Cursor rich preview) silently strip <details>
          # tags when they round-trip the file. Catch this before push.
          # Expectation: 13 <details> blocks total —
          #   4 in Quick start (One-shot prompt / Agent Skill / OpenClaw plugin / TypeScript)
          #   9 in Integrations (one per supported framework)
          expected=13
          opens=$(grep -c '^<details>' README.md || echo 0)
          closes=$(grep -c '^</details>' README.md || echo 0)
          if [ "$opens" -ne "$expected" ] || [ "$closes" -ne "$expected" ]; then
            echo "::error file=README.md::Expected ${expected} <details>/</details> pairs, found ${opens} open / ${closes} close. WYSIWYG markdown editor likely stripped them — re-add, or edit only in plain-text source mode."
            exit 1
          fi
          # Sanity: required summary labels (one per collapsible)
          required_summaries=(
            "<summary><b>TypeScript</b></summary>"
            "<summary><b>One-shot prompt</b>"
            "<summary><b>Install as an Agent Skill</b></summary>"
            "<summary><b>Install as an OpenClaw Plugin</b></summary>"
            "<summary><b>No framework</b>"
            "<summary><b>LangGraph / LangChain.js</b>"
            "<summary><b>Claude Agent SDK</b>"
            "<summary><b>OpenAI SDK</b>"
            "<summary><b>OpenAI Agents SDK</b>"
            "<summary><b>Google ADK</b>"
            "<summary><b>Vercel AI SDK</b>"
            "<summary><b>CrewAI</b>"
            "<summary><b>MCP</b>"
          )
          missing=0
          for s in "${required_summaries[@]}"; do
            if ! grep -qF "$s" README.md; then
              echo "::error file=README.md::Required collapsible summary missing: $s"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Check README header assets intact
        run: |
          # Same WYSIWYG-strip pattern that hits <details> also nukes:
          #   - banner image markdown at top
          #   - architecture diagram reference in SOTA section
          #   - <p align="center"> wrappers around badges + Star CTA
          # Catch any of these going missing before push hits main.
          fail=0

          # Banner image markdown reference at top of README
          if ! grep -qE '!\[Sponsio\]\(assets/readme-banner\.png\)' README.md; then
            echo "::error file=README.md::Banner image markdown missing — '![Sponsio](assets/readme-banner.png)' was stripped (likely by WYSIWYG editor). Re-add at the top of the file."
            fail=1
          fi

          # Architecture diagram reference (anywhere in README)
          if ! grep -qE 'assets/sponsio-architecture\.png' README.md; then
            echo "::error file=README.md::Architecture diagram reference missing — 'assets/sponsio-architecture.png' was stripped. Re-add inside the SOTA section."
            fail=1
          fi

          # Centered HTML wrappers (utility badges + social badges + Star CTA → 3 minimum)
          centered=$(grep -c '^<p align="center">' README.md || echo 0)
          min_centered=3
          if [ "$centered" -lt "$min_centered" ]; then
            echo "::error file=README.md::Expected ≥${min_centered} <p align=\"center\"> blocks (utility badges + social badges + Star CTA), found ${centered}. WYSIWYG editor likely stripped them."
            fail=1
          fi

          # Asset files actually exist in the repo
          for f in assets/readme-banner.png assets/sponsio-architecture.png; do
            if [ ! -f "$f" ]; then
              echo "::error file=${f}::Image asset missing from repo."
              fail=1
            fi
          done

          [ "$fail" -eq 0 ]
